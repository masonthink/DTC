# Air 热重载配置（make dev）
root = "."
tmp_dir = "tmp"

[build]
  cmd            = "go build -o ./tmp/main ./cmd/server"
  bin            = "./tmp/main"
  delay          = 1000
  exclude_dir    = ["tmp", "vendor"]
  include_ext    = ["go"]
  exclude_regex  = ["_test\\.go"]
  stop_on_error  = true
  log            = "build-errors.log"

[log]
  time = true

[color]
  build  = "yellow"
  runner = "green"
  watcher = "cyan"
