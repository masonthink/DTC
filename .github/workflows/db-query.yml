name: Fix SSH Firewall

on:
  workflow_dispatch:

jobs:
  fix-firewall:
    name: Fix SSH Firewall
    runs-on: ubuntu-latest
    steps:
      - name: SSH - diagnose and fix firewall
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            echo "=== Current firewall status ==="
            sudo ufw status verbose 2>&1 || echo "ufw not available"
            echo ""

            echo "=== iptables SSH rules ==="
            sudo iptables -L INPUT -n --line-numbers 2>&1 | head -30
            echo ""

            echo "=== fail2ban status ==="
            sudo fail2ban-client status 2>&1 || echo "fail2ban not running"
            sudo fail2ban-client status sshd 2>&1 || echo "no sshd jail"
            echo ""

            echo "=== sshd config highlights ==="
            sudo grep -E "^(AllowUsers|DenyUsers|AllowGroups|Match|MaxAuthTries|PermitRootLogin|PasswordAuthentication)" /etc/ssh/sshd_config 2>&1 || true
            echo ""

            echo "=== List sshd_config.d/ ==="
            ls -la /etc/ssh/sshd_config.d/ 2>&1
            echo ""

            echo "=== Show extra config files ==="
            for f in /etc/ssh/sshd_config.d/*.conf; do
              echo "--- $f ---"
              cat "$f" 2>&1
              echo ""
            done

            echo "=== Fix: remove duplicate Port entries from sshd_config.d ==="
            for f in /etc/ssh/sshd_config.d/*.conf; do
              if grep -q "^Port 22$" "$f" 2>/dev/null; then
                echo "Removing Port 22 from $f"
                sudo sed -i '/^Port 22$/d' "$f"
              fi
            done
            echo ""

            echo "=== Fix: ensure only one Port 22 in main config ==="
            echo "Before:"
            grep "^Port" /etc/ssh/sshd_config 2>&1
            echo ""

            echo "=== Restart sshd ==="
            sudo systemctl restart ssh 2>&1 || sudo systemctl restart sshd 2>&1
            echo ""

            echo "=== Verify sshd is running ==="
            sudo systemctl status ssh --no-pager 2>&1 | head -15
            echo ""

            echo "=== sshd logs after restart ==="
            sudo journalctl -u ssh --no-pager -n 10 2>&1
            echo ""

            echo "=== Remove stale known_hosts on local ==="
            echo "You may need to run: ssh-keygen -R 45.32.57.146"
            echo ""

            echo "=== Done ==="
