name: Fix SSH Firewall

on:
  workflow_dispatch:

jobs:
  fix-firewall:
    name: Fix SSH Firewall
    runs-on: ubuntu-latest
    steps:
      - name: SSH - diagnose and fix firewall
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            echo "=== Current firewall status ==="
            sudo ufw status verbose 2>&1 || echo "ufw not available"
            echo ""

            echo "=== iptables SSH rules ==="
            sudo iptables -L INPUT -n --line-numbers 2>&1 | head -30
            echo ""

            echo "=== fail2ban status ==="
            sudo fail2ban-client status 2>&1 || echo "fail2ban not running"
            sudo fail2ban-client status sshd 2>&1 || echo "no sshd jail"
            echo ""

            echo "=== sshd config highlights ==="
            sudo grep -E "^(AllowUsers|DenyUsers|AllowGroups|Match|MaxAuthTries|PermitRootLogin|PasswordAuthentication)" /etc/ssh/sshd_config 2>&1 || true
            echo ""

            echo "=== sshd full config (non-comment) ==="
            sudo grep -v '^#' /etc/ssh/sshd_config | grep -v '^$' 2>&1
            echo ""

            echo "=== sshd host keys ==="
            ls -la /etc/ssh/ssh_host_* 2>&1
            echo ""

            echo "=== sshd logs (last 30 lines) ==="
            sudo journalctl -u ssh --no-pager -n 30 2>&1 || sudo journalctl -u sshd --no-pager -n 30 2>&1
            echo ""

            echo "=== Test local SSH connection ==="
            ssh -v -o ConnectTimeout=5 -o StrictHostKeyChecking=no deploy@localhost "echo local-ok" 2>&1 || true
            echo ""

            echo "=== MaxStartups and connection limits ==="
            sudo grep -i "maxstartups\|maxsessions\|logingraceTime\|clientalive" /etc/ssh/sshd_config 2>&1 || true
            echo ""

            echo "=== TCP wrappers ==="
            cat /etc/hosts.deny 2>&1 || echo "no hosts.deny"
            echo "---"
            cat /etc/hosts.allow 2>&1 || echo "no hosts.allow"
            echo ""

            echo "=== Done ==="
