name: Fix SSH Firewall

on:
  workflow_dispatch:

jobs:
  fix-firewall:
    name: Fix SSH Firewall
    runs-on: ubuntu-latest
    steps:
      - name: SSH - diagnose and fix sshd
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            echo "=== 50-cloud-init.conf content ==="
            sudo cat /etc/ssh/sshd_config.d/50-cloud-init.conf 2>&1
            echo ""

            echo "=== Full effective sshd config (first 60 lines) ==="
            sudo sshd -T 2>&1 | head -60
            echo ""

            echo "=== Current unauthenticated SSH connections ==="
            ss -tn state established '( sport = :22 )' 2>&1 | wc -l
            ss -tn state established '( sport = :22 )' 2>&1 | head -20
            echo ""

            echo "=== Fix: increase MaxStartups to handle scan traffic ==="
            sudo sed -i '/^#\?MaxStartups/d' /etc/ssh/sshd_config
            echo "MaxStartups 50:30:200" | sudo tee -a /etc/ssh/sshd_config
            echo ""

            echo "=== Validate config ==="
            sudo sshd -t 2>&1 && echo "Config OK" || echo "Config INVALID"
            echo ""

            echo "=== Restart sshd ==="
            sudo systemctl restart ssh 2>&1
            echo ""

            echo "=== sshd logs ==="
            sudo journalctl -u ssh --no-pager -n 10 2>&1
            echo ""

            echo "=== Done ==="
