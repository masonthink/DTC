name: Fix SSH Firewall

on:
  workflow_dispatch:

jobs:
  fix-firewall:
    name: Fix SSH Firewall
    runs-on: ubuntu-latest
    steps:
      - name: SSH - check iptables and nftables in detail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            echo "=== Full iptables rules (all chains) ==="
            sudo iptables-save 2>&1 | head -80
            echo ""

            echo "=== nftables rules ==="
            sudo nft list ruleset 2>&1 | head -80
            echo ""

            echo "=== Check for any IP blacklists ==="
            sudo ipset list 2>&1 | head -30 || echo "no ipset"
            echo ""

            echo "=== Recent sshd rejections in auth log ==="
            sudo grep "Connection closed" /var/log/auth.log 2>/dev/null | tail -10 || sudo journalctl -u ssh --no-pager -n 30 2>&1 | grep -i "close\|refuse\|drop\|reject\|ban"
            echo ""

            echo "=== Open port 8443 in ufw ==="
            sudo ufw allow 8443/tcp 2>&1
            echo ""

            echo "=== Open ports 80 and 443 too ==="
            sudo ufw allow 80/tcp 2>&1
            sudo ufw allow 443/tcp 2>&1
            echo ""

            echo "=== Final ufw status ==="
            sudo ufw status verbose 2>&1
            echo ""

            echo "=== Done ==="
