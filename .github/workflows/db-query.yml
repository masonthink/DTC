name: Fix SSH Firewall

on:
  workflow_dispatch:

jobs:
  fix-firewall:
    name: Fix SSH Firewall
    runs-on: ubuntu-latest
    steps:
      - name: SSH - diagnose and fix firewall
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            echo "=== Current firewall status ==="
            sudo ufw status verbose 2>&1 || echo "ufw not available"
            echo ""

            echo "=== iptables SSH rules ==="
            sudo iptables -L INPUT -n --line-numbers 2>&1 | head -30
            echo ""

            echo "=== fail2ban status ==="
            sudo fail2ban-client status 2>&1 || echo "fail2ban not running"
            sudo fail2ban-client status sshd 2>&1 || echo "no sshd jail"
            echo ""

            echo "=== sshd config highlights ==="
            sudo grep -E "^(AllowUsers|DenyUsers|AllowGroups|Match|MaxAuthTries|PermitRootLogin|PasswordAuthentication)" /etc/ssh/sshd_config 2>&1 || true
            echo ""

            echo "=== Fix: allow SSH from all sources ==="
            sudo ufw allow ssh 2>&1 || true
            sudo ufw allow 22/tcp 2>&1 || true
            echo ""

            echo "=== Fix: reset fail2ban sshd jail ==="
            sudo fail2ban-client unban --all 2>&1 || true
            echo ""

            echo "=== Fix: ensure ufw default allows SSH ==="
            sudo ufw status verbose 2>&1
            echo ""

            echo "=== Reload sshd ==="
            sudo systemctl reload sshd 2>&1 || sudo systemctl reload ssh 2>&1 || true
            echo ""

            echo "=== Done ==="
